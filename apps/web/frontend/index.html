<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <header class="my-4">
            <h1 class="text-center">To-Do List</h1>
            <button id="toggle-theme" class="btn btn-secondary">Toggle Dark/Light Mode</button>
        </header>
        <main>
            <section id="todo-form" class="mb-4">
                <h2>Add New Todo</h2>
                <form id="add-todo-form">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" class="form-control"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="priority" class="form-label">Priority</label>
                        <select id="priority" class="form-select">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="due-date" class="form-label">Due Date</label>
                        <input type="date" id="due-date" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Todo</button>
                </form>
            </section>
            <section id="todo-list">
                <h2>Your Todos</h2>
                <ul class="list-group"></ul>
                <div class="empty-state d-none">
                    <p class="text-center">No todos available. Please add a todo.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
